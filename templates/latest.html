{% extends "base.html" %}

{% block content %}
{% set blog = get_section(path="blog/_index.md") %}
{% set latest = blog.pages | first %}
<meta http-equiv="refresh" content="0; url={{ latest.permalink | replace(from=config.base_url, to='') }}">
<p>Redirecting to <a href="{{ latest.permalink | replace(from=config.base_url, to='') }}">{{ latest.title }}</a>...</p>
{% endblock content %}
